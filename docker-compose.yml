version: '3.9'

services:
  graphdb:
    image: ontotext/graphdb:10.8.0
    restart: unless-stopped
    ports:
      - "7200:7200"
    volumes:
      - graphdb_data:/opt/graphdb/home
    # Optional: tune memory for your machine (uncomment if needed)
    # environment:
    #   - GDB_JAVA_OPTS=-Xms2g -Xmx2g

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      # SPARQL endpoint *inside* the Docker network (GraphDB repository must exist)
      - SPARQL_ENDPOINT=http://graphdb:7200/repositories/dhfi
      # CORS origin for the browser client
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - graphdb
    ports:
      - "4000:4000"
    command: npm start

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile
    restart: unless-stopped
    environment:
      # Used by the browser (host machine), not the Docker network
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    # Vite must listen on 0.0.0.0 inside container
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  graphdb_data:
