version: '3.9'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports: [ "27017:27017" ]
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/interactiondb
      - CLIENT_URL=http://localhost:5173
    depends_on: [ mongo ]
    ports: [ "4000:4000" ]
    volumes:
      - ./backend:/app
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on: [ backend ]
    ports: [ "5173:5173" ]
    volumes:
      - ./frontend:/app
    command: npm run dev

volumes:
  mongo_data:
